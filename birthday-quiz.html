<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Birthday Soul Reading</title>

<style>
  :root {
    --bg: #08070f;
    --surface: #100e1d;
    --card: #161328;
    --border: rgba(255,255,255,0.1);
    --text: #ffffff;
    --muted: #b8aed4;
    --faint: #2a2440;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 18px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(130,80,255,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(ellipse, rgba(255,100,150,0.1) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
  }

  .form-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 36px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }

  .form-top { text-align: center; margin-bottom: 40px; }

  .orb {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8250ff, #ff5fa0);
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px rgba(130,80,255,0.5);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 40px rgba(130,80,255,0.5); }
    50% { box-shadow: 0 0 70px rgba(130,80,255,0.8), 0 0 120px rgba(255,95,160,0.3); }
  }

  .form-top h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2.8rem; font-weight: 700;
    color: var(--text); line-height: 1.2; margin-bottom: 10px;
  }

  .form-top p { color: var(--muted); font-size: 1.1rem; font-weight: 300; }

  .field { margin-bottom: 20px; }

  .field label {
    display: block; font-size: 0.85rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 8px;
  }

  .field input[type="text"],
  .field select,
  .field input[type="number"] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    padding: 16px 20px;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 1.05rem;
    transition: border-color 0.25s, box-shadow 0.25s;
    appearance: none; -webkit-appearance: none;
  }

  .field input:focus, .field select:focus {
    outline: none;
    border-color: rgba(130,80,255,0.6);
    box-shadow: 0 0 0 3px rgba(130,80,255,0.12);
  }

  .field input::placeholder { color: var(--muted); }
  .field select option { background: #161328; }

  .date-row { display: flex; gap: 12px; }
  .date-row select { flex: 2; }
  .date-row input { flex: 1; }

  .err { color: #ff6b8a; font-size: 0.8rem; margin-top: 6px; display: none; }

  .submit-btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, #8250ff 0%, #ff5fa0 100%);
    color: #fff; font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    margin-top: 8px; letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 32px rgba(130,80,255,0.35);
  }

  .submit-btn:hover {
    opacity: 0.9; transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(130,80,255,0.5);
  }

  #result { display: none; }

  .result-hero {
    background: linear-gradient(160deg, #1a1535 0%, #0f0c20 100%);
    border: 1px solid rgba(130,80,255,0.2);
    border-radius: 24px;
    padding: 40px 32px 32px;
    text-align: center;
    margin-bottom: 16px;
    position: relative; overflow: hidden;
  }

  .result-hero::before {
    content: '';
    position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 200px;
    background: radial-gradient(ellipse, rgba(130,80,255,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-emoji {
    font-size: 72px; display: block; margin-bottom: 4px;
    animation: floatBig 4s ease-in-out infinite; position: relative;
  }

  @keyframes floatBig {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
  }

  .zodiac-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(130,80,255,0.2);
    border: 1px solid rgba(130,80,255,0.35);
    border-radius: 999px; padding: 4px 14px;
    font-size: 0.78rem; font-weight: 500; color: #c4a8ff;
    margin-bottom: 16px;
  }

  .hero-name {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.3rem; font-weight: 600; color: var(--muted); margin-bottom: 6px;
  }

  .hero-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2.6rem; font-weight: 700;
    color: #ffffff;
    line-height: 1.2; margin-bottom: 10px;
  }

  .hero-subtitle {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic; color: #c8bfe0; font-size: 1.2rem;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px;
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-label {
    font-size: 0.85rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--muted); margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }

  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .traits-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .trait-pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px;
  }

  .trait-pill .tl {
    font-size: 0.78rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); margin-bottom: 5px;
  }

  .trait-pill .tv { font-size: 1rem; font-weight: 500; color: #ffffff; }

  .horoscope-text {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.2rem; line-height: 2; color: #e8e0f8; font-style: italic;
  }

  .love-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .love-card {
    background: var(--card); border-radius: 12px;
    padding: 16px; border: 1px solid var(--border);
  }

  .love-card .lc-label {
    font-size: 0.78rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px;
  }

  .love-card .lc-val { font-size: 1rem; font-weight: 500; color: #ffffff; line-height: 1.4; }

  .career-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }

  .ctag {
    background: rgba(130,80,255,0.15);
    border: 1px solid rgba(130,80,255,0.3);
    border-radius: 999px; padding: 8px 16px;
    font-size: 0.9rem; font-weight: 500; color: #d4b8ff;
  }

  .career-desc { font-size: 1rem; color: #c0b4d8; line-height: 1.7; }

  .shadow-box {
    background: rgba(255,80,100,0.07);
    border: 1px solid rgba(255,80,100,0.18);
    border-radius: 14px; padding: 20px; margin-bottom: 14px;
  }

  .shadow-box p { font-size: 1rem; line-height: 1.7; color: #f0c0cc; }

  .shadow-growth { font-size: 0.95rem; color: #c0b4d8; line-height: 1.7; }
  .shadow-growth strong { color: #a8d5b5; }

  .famous-list { display: flex; flex-direction: column; gap: 12px; }

  .famous-person {
    display: flex; align-items: center; gap: 16px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
  }

  .famous-avatar {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    background: linear-gradient(135deg, #2a1f4a, #1a2040);
    flex-shrink: 0;
  }

  .famous-info .fn { font-weight: 600; font-size: 1.05rem; color: #ffffff; }
  .famous-info .fd { font-size: 0.88rem; color: var(--muted); margin-top: 3px; }

  .lucky-strip { display: flex; gap: 12px; flex-wrap: wrap; }

  .lucky-chip {
    flex: 1; min-width: 110px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; text-align: center;
  }

  .lucky-chip .lce { font-size: 24px; margin-bottom: 6px; }
  .lucky-chip .lcl { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; }
  .lucky-chip .lcv { font-size: 0.95rem; font-weight: 600; color: #ffffff; }

  .reset-btn {
    width: 100%; padding: 14px; border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent; color: var(--muted);
    font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 0.9rem;
    cursor: pointer; transition: all 0.2s; margin-top: 6px;
  }

  .reset-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  @media (max-width: 480px) {
    .form-wrap { padding: 32px 20px; }
    .result-hero { padding: 32px 20px 24px; }
    .section { padding: 20px; }
    .traits-row, .love-grid { grid-template-columns: 1fr; }
    .hero-title { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="form-wrap" id="formWrap">
    <div class="form-top">
      <div class="orb">🔮</div>
      <h1>Your Birthday Soul Reading</h1>
      <p>Zodiac wisdom meets birth energy — discover who you truly are</p>
    </div>
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="nameIn" placeholder="e.g. Maya" maxlength="30">
    </div>
    <div class="field">
      <label>Your Birthday</label>
      <div class="date-row">
        <select id="monthIn">
          <option value="">Select Month</option>
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
        <input type="number" id="dayIn" placeholder="Day" min="1" max="31">
      </div>
      <p class="err" id="errMsg">Please pick a valid month and day ✨</p>
    </div>
    <button class="submit-btn" onclick="reveal()">🔮 Read My Soul</button>
  </div>

  <div id="result">
    <div class="result-hero">
      <span class="hero-emoji" id="heroEmoji"></span>
      <div class="zodiac-badge" id="zodiacBadge"></div>
      <div class="hero-name" id="heroName"></div>
      <div class="hero-title" id="heroTitle"></div>
      <div class="hero-subtitle" id="heroSub"></div>
    </div>

    <div class="section" style="animation-delay:0.05s">
      <div class="section-label">✦ Core Traits</div>
      <div class="traits-row" id="traitsRow"></div>
    </div>

    <div class="section" style="animation-delay:0.1s">
      <div class="section-label">🌙 Your Soul Reading</div>
      <p class="horoscope-text" id="horoscope"></p>
    </div>

    <div class="section" style="animation-delay:0.15s">
      <div class="section-label">💫 Love & Relationships</div>
      <div class="love-grid" id="loveGrid"></div>
    </div>

    <div class="section" style="animation-delay:0.2s">
      <div class="section-label">⚡ Career Strengths</div>
      <div class="career-tags" id="careerTags"></div>
      <p class="career-desc" id="careerDesc"></p>
    </div>

    <div class="section" style="animation-delay:0.25s">
      <div class="section-label">🌑 Shadow Side</div>
      <div class="shadow-box"><p id="shadowText"></p></div>
      <p class="shadow-growth" id="shadowGrowth"></p>
    </div>

    <div class="section" style="animation-delay:0.3s">
      <div class="section-label">⭐ Famous People Born This Month</div>
      <div class="famous-list" id="famousList"></div>
    </div>

    <div class="section" style="animation-delay:0.35s">
      <div class="section-label">🍀 Lucky Charms</div>
      <div class="lucky-strip" id="luckyStrip"></div>
    </div>

    <button class="reset-btn" onclick="reset()">↩ Read Another Birthday</button>
  </div>

</div>

function getZodiac(m,d){
  if((m===1&&d>=20)||(m===2&&d<=18))return{sign:"Aquarius",sym:"♒",el:"Air"};
  if((m===2&&d>=19)||(m===3&&d<=20))return{sign:"Pisces",sym:"♓",el:"Water"};
  if((m===3&&d>=21)||(m===4&&d<=19))return{sign:"Aries",sym:"♈",el:"Fire"};
  if((m===4&&d>=20)||(m===5&&d<=20))return{sign:"Taurus",sym:"♉",el:"Earth"};
  if((m===5&&d>=21)||(m===6&&d<=20))return{sign:"Gemini",sym:"♊",el:"Air"};
  if((m===6&&d>=21)||(m===7&&d<=22))return{sign:"Cancer",sym:"♋",el:"Water"};
  if((m===7&&d>=23)||(m===8&&d<=22))return{sign:"Leo",sym:"♌",el:"Fire"};
  if((m===8&&d>=23)||(m===9&&d<=22))return{sign:"Virgo",sym:"♍",el:"Earth"};
  if((m===9&&d>=23)||(m===10&&d<=22))return{sign:"Libra",sym:"♎",el:"Air"};
  if((m===10&&d>=23)||(m===11&&d<=21))return{sign:"Scorpio",sym:"♏",el:"Water"};
  if((m===11&&d>=22)||(m===12&&d<=21))return{sign:"Sagittarius",sym:"♐",el:"Fire"};
  return{sign:"Capricorn",sym:"♑",el:"Earth"};
}

function reveal(){
  const name=document.getElementById('nameIn').value.trim()||"Stargazer";
  const m=parseInt(document.getElementById('monthIn').value);
  const d=parseInt(document.getElementById('dayIn').value);
  const err=document.getElementById('errMsg');
  if(!m||!d||d<1||d>31){err.style.display='block';return;}
  err.style.display='none';

  const z=getZodiac(m,d);
  const zd=ZD[z.sign];
  const famous=MF[m];

  document.getElementById('heroEmoji').textContent=zd.emoji;
  document.getElementById('zodiacBadge').textContent=`${z.sym} ${z.sign} · ${z.el} Sign`;
  document.getElementById('heroName').textContent=name+"'s Reading";
  document.getElementById('heroTitle').textContent=zd.title;
  document.getElementById('heroSub').textContent=zd.sub;

  document.getElementById('traitsRow').innerHTML=zd.traits.map(t=>`
    <div class="trait-pill"><div class="tl">${t.l}</div><div class="tv">${t.v}</div></div>`).join('');

  document.getElementById('horoscope').textContent=zd.horoscope;

  const lv=zd.love;
  document.getElementById('loveGrid').innerHTML=`
    <div class="love-card"><div class="lc-label">💞 Love Style</div><div class="lc-val">${lv.style}</div></div>
    <div class="love-card"><div class="lc-label">🌹 What You Need</div><div class="lc-val">${lv.need}</div></div>
    <div class="love-card"><div class="lc-label">🎁 What You Offer</div><div class="lc-val">${lv.offer}</div></div>
    <div class="love-card"><div class="lc-label">⚠️ Your Challenge</div><div class="lc-val">${lv.challenge}</div></div>`;

  document.getElementById('careerTags').innerHTML=zd.career.tags.map(t=>`<span class="ctag">${t}</span>`).join('');
  document.getElementById('careerDesc').textContent=zd.career.desc;

  document.getElementById('shadowText').textContent=zd.shadow;
  document.getElementById('shadowGrowth').innerHTML=zd.growth;

  document.getElementById('famousList').innerHTML=famous.map(f=>`
    <div class="famous-person">
      <div class="famous-avatar">${f.e}</div>
      <div class="famous-info"><div class="fn">${f.n}</div><div class="fd">${f.d}</div></div>
    </div>`).join('');

  const lk=zd.lucky;
  document.getElementById('luckyStrip').innerHTML=`
    <div class="lucky-chip"><div class="lce">🎨</div><div class="lcl">Color</div><div class="lcv">${lk.color}</div></div>
    <div class="lucky-chip"><div class="lce">🔢</div><div class="lcl">Number</div><div class="lcv">${lk.number}</div></div>
    <div class="lucky-chip"><div class="lce">📅</div><div class="lcl">Day</div><div class="lcv">${lk.day}</div></div>
    <div class="lucky-chip"><div class="lce">💎</div><div class="lcl">Gem</div><div class="lcv">${lk.gem}</div></div>`;

  document.getElementById('formWrap').style.display='none';
  document.getElementById('result').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function reset(){
  document.getElementById('formWrap').style.display='block';
  document.getElementById('result').style.display='none';
  document.getElementById('nameIn').value='';
  document.getElementById('monthIn').value='';
  document.getElementById('dayIn').value='';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
