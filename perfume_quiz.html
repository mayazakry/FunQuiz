<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Scent Soul — Perfume Personality Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F9F4EE;
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --dark: #1A1208;
    --muted: #7A6A55;
    --rose: #D4A8A0;
    --green: #8A9E8C;
    --blue: #8A9EB5;
    --amber: #C97C3A;
    --ink: #2C2418;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* DECORATIVE BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 10% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(212,168,160,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(138,158,140,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease both;
  }

  .header-ornament {
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 12px;
    margin-bottom: 16px;
    display: block;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    font-weight: 300;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .header p {
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
  }
  .divider span {
    color: var(--gold);
    font-size: 1rem;
  }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 36px;
    animation: fadeIn 0.6s ease both;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .progress-track {
    height: 2px;
    background: var(--gold-light);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--amber));
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* QUESTION CARD */
  .question-card {
    background: white;
    border-radius: 2px;
    padding: 40px 36px;
    box-shadow: 0 2px 40px rgba(26,18,8,0.06), 0 0 0 1px rgba(201,168,76,0.15);
    animation: fadeUp 0.5s ease both;
    margin-bottom: 20px;
  }

  .q-number {
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .q-emoji {
    font-size: 2rem;
    margin-bottom: 16px;
    display: block;
  }

  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.2rem, 3.5vw, 1.55rem);
    font-weight: 300;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .q-sub {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 28px;
    line-height: 1.6;
  }

  /* OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.25s ease;
    background: transparent;
    text-align: left;
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.05), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .option:hover {
    border-color: var(--gold);
    transform: translateX(4px);
  }

  .option:hover::before { opacity: 1; }

  .option.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
  }

  .option.selected::before { opacity: 1; }

  .opt-icon {
    font-size: 1.3rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .opt-content {}

  .opt-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--ink);
    display: block;
    margin-bottom: 2px;
  }

  .opt-desc {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.3px;
    line-height: 1.5;
  }

  .opt-check {
    margin-left: auto;
    width: 18px;
    height: 18px;
    border: 1px solid var(--gold-light);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 0.6rem;
    color: transparent;
    margin-top: 2px;
  }

  .option.selected .opt-check {
    background: var(--gold);
    border-color: var(--gold);
    color: white;
  }

  /* NAV BUTTONS */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }

  .btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 28px;
    cursor: pointer;
    transition: all 0.25s;
    border-radius: 1px;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--gold-light);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

  .btn-primary {
    background: var(--gold);
    border: 1px solid var(--gold);
    color: white;
  }
  .btn-primary:hover { background: var(--amber); border-color: var(--amber); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,168,76,0.3); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── RESULT ── */
  .result {
    animation: fadeUp 0.7s ease both;
    display: none;
  }

  .result-hero {
    background: white;
    border-radius: 2px;
    padding: 48px 36px 36px;
    box-shadow: 0 2px 40px rgba(26,18,8,0.06), 0 0 0 1px rgba(201,168,76,0.15);
    text-align: center;
    margin-bottom: 20px;
  }

  .result-badge {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 6px 18px;
    border: 1px solid var(--gold);
    color: var(--gold);
    margin-bottom: 24px;
  }

  .result-emoji {
    font-size: 3.5rem;
    display: block;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 300;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .result-subtitle {
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .result-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    line-height: 1.8;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto 28px;
  }

  /* SCENT NOTES */
  .notes-section {
    background: white;
    border-radius: 2px;
    padding: 28px 36px;
    box-shadow: 0 2px 40px rgba(26,18,8,0.06), 0 0 0 1px rgba(201,168,76,0.15);
    margin-bottom: 16px;
  }

  .notes-title {
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .notes-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .note-group { text-align: center; }

  .note-label {
    font-size: 0.58rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .note-items {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .note-item {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-style: italic;
    color: var(--ink);
    padding: 4px 8px;
    background: var(--cream);
    border-radius: 1px;
  }

  /* RECOMMENDATIONS */
  .recs-title {
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .rec-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .rec-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: var(--cream);
    border-left: 2px solid var(--gold-light);
  }

  .rec-house {
    font-size: 0.6rem;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 2px;
  }

  .rec-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--ink);
  }

  /* TRAIT BARS */
  .traits-section {
    background: white;
    border-radius: 2px;
    padding: 28px 36px;
    box-shadow: 0 2px 40px rgba(26,18,8,0.06), 0 0 0 1px rgba(201,168,76,0.15);
    margin-bottom: 16px;
  }

  .trait-row {
    margin-bottom: 14px;
  }

  .trait-label-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .trait-name {
    font-size: 0.68rem;
    letter-spacing: 1px;
    color: var(--ink);
    text-transform: uppercase;
  }

  .trait-val {
    font-size: 0.68rem;
    color: var(--gold);
  }

  .trait-track {
    height: 3px;
    background: var(--cream);
    border-radius: 2px;
    overflow: hidden;
  }

  .trait-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-light), var(--gold));
    border-radius: 2px;
    width: 0;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .restart-btn {
    display: block;
    width: 100%;
    text-align: center;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--gold-light);
    color: var(--muted);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    border-radius: 1px;
  }
  .restart-btn:hover { border-color: var(--gold); color: var(--gold); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>

    <div class="traits-section">

      <div id="r-traits"></div>

    <button class="restart-btn" onclick="restart()">✦ Retake the Quiz ✦</button>

</div>

// ─── STATE ───────────────────────────────────────────────
let current = 0;
let answers = new Array(questions.length).fill(null);

// ─── RENDER ──────────────────────────────────────────────
function render() {
  const q = questions[current];
  const total = questions.length;

  document.getElementById('prog-text').textContent = `Question ${current + 1} of ${total}`;
  document.getElementById('prog-pct').textContent = Math.round((current / total) * 100) + '%';
  document.getElementById('prog-fill').style.width = ((current / total) * 100) + '%';

  document.getElementById('q-num').textContent = `Question ${String(current + 1).padStart(2, '0')}`;
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-sub').textContent = q.sub;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `
      <span class="opt-icon">${opt.icon}</span>
      <div class="opt-content">
        <span class="opt-label">${opt.label}</span>
        <span class="opt-desc">${opt.desc}</span>
      </div>
      <div class="opt-check">✓</div>`;
    btn.onclick = () => selectOption(i);
    opts.appendChild(btn);
  });

  document.getElementById('btn-back').style.visibility = current === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').disabled = answers[current] === null;
  document.getElementById('btn-next').textContent = current === total - 1 ? 'See My Scent Soul ✦' : 'Continue →';

  // Animate card
  const card = document.getElementById('q-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeUp 0.4s ease both';
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  document.getElementById('btn-next').disabled = false;
}

function goNext() {
  if (answers[current] === null) return;
  if (current < questions.length - 1) {
    current++;
    render();
  } else {
    showResult();
  }
}

function goBack() {
  if (current > 0) { current--; render(); }
}

// ─── SCORING ─────────────────────────────────────────────
function showResult() {
  const scores = {};
  answers.forEach((ai, qi) => {
    if (ai === null) return;
    const tags = questions[qi].options[ai].tags;
    Object.entries(tags).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
  });

  // Map to profile
  const map = {
    fresh: (scores.fresh||0) + (scores.aqua||0) + (scores.citrus||0),
    floral: (scores.floral||0) + (scores.powdery||0),
    oriental: (scores.oriental||0) + (scores.spicy||0) + (scores.sweet||0),
    woody: (scores.woody||0) + (scores.musky||0),
    green: (scores.green||0) + (scores.earthy||0),
  };

  const top = Object.entries(map).sort((a,b) => b[1]-a[1])[0][0];
  const p = profiles[top];

  document.getElementById('quiz').style.display = 'none';
  const res = document.getElementById('result');
  res.style.display = 'block';

  document.getElementById('r-emoji').textContent = p.emoji;
  document.getElementById('r-title').textContent = p.title;
  document.getElementById('r-subtitle').textContent = p.subtitle;
  document.getElementById('r-desc').textContent = p.desc;

  document.getElementById('r-top').innerHTML = p.top.map(n => `<span class="note-item">${n}</span>`).join('');
  document.getElementById('r-heart').innerHTML = p.heart.map(n => `<span class="note-item">${n}</span>`).join('');
  document.getElementById('r-base').innerHTML = p.base.map(n => `<span class="note-item">${n}</span>`).join('');
  document.getElementById('r-recs').innerHTML = p.recs.map(r => `
    <div class="rec-item">
      <div>
        <span class="rec-house">${r.house}</span>
        <span class="rec-name">${r.name}</span>
      </div>
    </div>`).join('');

  const traitsEl = document.getElementById('r-traits');
  traitsEl.innerHTML = Object.entries(p.traits).map(([name, val]) => `
    <div class="trait-row">
      <div class="trait-label-row">
        <span class="trait-name">${name}</span>
        <span class="trait-val">${val}%</span>
      </div>
      <div class="trait-track">
        <div class="trait-fill" style="width:0%" data-val="${val}"></div>
      </div>
    </div>`).join('');

  // Animate trait bars
  setTimeout(() => {
    document.querySelectorAll('.trait-fill').forEach(el => {
      el.style.width = el.dataset.val + '%';
    });
  }, 300);
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  render();
}

// ─── INIT ────────────────────────────────────────────────
render();
</script>
